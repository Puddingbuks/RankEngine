<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pagina niet gevonden - RankEngine</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css?v=2" />
<link rel="stylesheet" href="css/pages.css?v=2" />
<script>(function(){var t=localStorage.getItem("theme")||(window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t);})();</script>
</head>
<body>

<header class="sub-nav">
  <div class="wrap sub-nav-inner">
    <a href="/" class="logo"><span class="mark" aria-hidden="true"></span><span>Rank<b>Engine</b></span></a>
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Terug naar home
    </a>
    <button class="theme-toggle" id="themeToggle" aria-label="Schakel naar lichte modus">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="error-page">
    <div class="error-code">Fout 404</div>
    <h1>Pagina niet gevonden.</h1>
    <p class="error-sub">Deze pagina bestaat niet (meer) of het adres klopt niet. Gelukkig is de rest van de site gewoon bereikbaar.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Terug naar home <span class="arrow">→</span></a>
      <a href="/#contact" class="btn btn-ghost">Neem contact op</a>
    </div>
  </div>
</main>

<footer class="sub-footer">
  <div class="wrap sub-footer-inner">
    <span>© 2026 RankEngine · KvK 94381143</span>
    <div class="sub-footer-links">
      <a href="/privacy.html">Privacybeleid</a>
      <a href="/algemene-voorwaarden.html">Algemene voorwaarden</a>
    </div>
  </div>
</footer>

<script>
(function(){
  var html = document.documentElement;
  var btn  = document.getElementById("themeToggle");
  function applyTheme(t){
    html.setAttribute("data-theme", t);
    if(btn) btn.setAttribute("aria-label", t === "light" ? "Schakel naar donkere modus" : "Schakel naar lichte modus");
    localStorage.setItem("theme", t);
  }
  applyTheme(localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
  if(btn) btn.addEventListener("click", function(){
    applyTheme(html.getAttribute("data-theme") === "light" ? "dark" : "light");
  });
})();
</script>
</body>
</html>

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Contactformulier doorsturen naar N8N op de host
    location /api/contact {
        proxy_pass http://host.docker.internal:5678/webhook/rankengine-contact;
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache headers voor statische assets
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML: geen cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Onbekende paden -> 404.html
    location / {
        try_files $uri $uri/ $uri.html =404;
        error_page 404 /404.html;
    }

    # Verberg .git en verborgen mappen
    location ~ /\. {
        deny all;
    }
}

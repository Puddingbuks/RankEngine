version: '3.8'

services:

  # ── Nginx: serveert de statische bestanden ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rankengine-nginx
    restart: unless-stopped
    volumes:
      - /opt/rankengine:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ── Caddy: reverse proxy + automatisch SSL ─────────────────────────
  caddy:
    image: caddy:alpine
    container_name: rankengine-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"  # bereik N8N op de host
    depends_on:
      - nginx

volumes:
  caddy_data:
  caddy_config:

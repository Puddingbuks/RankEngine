version: '3.8'

services:

  # ── Nginx: serveert de statische bestanden + proxiet /api/contact naar N8N
  nginx:
    image: nginx:alpine
    container_name: rankengine-nginx
    restart: unless-stopped
    volumes:
      - /opt/rankengine:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Cloudflare Tunnel: veilige verbinding zonder open poorten
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rankengine-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - nginx

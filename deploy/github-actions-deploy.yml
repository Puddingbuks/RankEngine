name: Deploy naar homelab

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "==> Pull laatste versie..."
            git -C /opt/rankengine pull --ff-only

            echo "==> Nginx herladen..."
            docker exec rankengine-nginx nginx -s reload

            echo "==> Done: $(date)"

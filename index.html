<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RankEngine — SEO &amp; advertenties voor Nederlandse ondernemers</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
  <style>
/* ==========================================================
   RankEngine — design tokens + base styles
   ========================================================== */
:root {
  --navy: #1A2E4A;
  --navy-ink: #0F1E33;
  --navy-soft: #24385A;
  --orange: #FF6B35;
  --orange-ink: #E45A28;
  --off-white: #F8F7F4;
  --grey: #EEECE8;
  --grey-line: #E1DED8;
  --near-black: #1A1A1A;
  --muted: #5B6070;
  --white: #FFFFFF;

  --font-display: 'Satoshi', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-body: 'Satoshi', 'Helvetica Neue', Helvetica, Arial, sans-serif;

  --shell-x: clamp(24px, 5vw, 88px);
  --section-y: clamp(80px, 10vw, 160px);

  --radius: 4px;
  --radius-lg: 14px;
  --ease: cubic-bezier(.2,.7,.2,1);
}

html[data-density="tight"] {
  --section-y: clamp(56px, 6vw, 96px);
  --shell-x: clamp(20px, 4vw, 56px);
}
html[data-accent="crimson"] { --orange: #E23A3A; --orange-ink: #B52A2A; }
html[data-accent="emerald"] { --orange: #2FB877; --orange-ink: #229565; }
html[data-accent="electric"] { --orange: #3D5BFF; --orange-ink: #2A44D4; }

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--off-white);
  color: var(--near-black);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
img, svg { display: block; max-width: 100%; }

::selection { background: var(--orange); color: var(--white); }

/* ---------- Type scale ---------- */
.h1 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(44px, 8vw, 80px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  margin: 0;
  text-wrap: balance;
}
.h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(34px, 5vw, 60px);
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0;
  text-wrap: balance;
}
.h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(24px, 3vw, 40px);
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin: 0;
}
.lead {
  font-size: clamp(18px, 1.6vw, 20px);
  line-height: 1.55;
  font-weight: 400;
  color: var(--near-black);
  text-wrap: pretty;
}
.small {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.mono {
  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 28px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 16px;
  letter-spacing: -0.005em;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  transition: transform .3s var(--ease), background .25s var(--ease), color .25s var(--ease), box-shadow .25s var(--ease);
  text-decoration: none;
  line-height: 1;
  white-space: nowrap;
}
.btn-primary {
  background: var(--orange);
  color: var(--white);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), inset 0 -1px 0 rgba(0,0,0,0.08);
}
.btn-primary:hover { background: var(--orange-ink); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost {
  background: transparent;
  color: var(--near-black);
  border: 1px solid var(--grey-line);
}
.btn-ghost:hover { border-color: var(--near-black); }
.btn-dark {
  background: var(--white);
  color: var(--navy);
}
.btn-dark:hover { background: var(--off-white); }
.btn .arrow {
  display: inline-block;
  transition: transform .3s var(--ease);
}
.btn:hover .arrow { transform: translateX(4px); }

/* ---------- Shell / layout ---------- */
.shell {
  padding-left: var(--shell-x);
  padding-right: var(--shell-x);
  max-width: 1440px;
  margin: 0 auto;
}
.section { padding-top: var(--section-y); padding-bottom: var(--section-y); }
.section-grey { background: var(--grey); }
.section-navy { background: var(--navy); color: var(--white); }
.section-navy .lead { color: rgba(255,255,255,0.76); }

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}
.section-navy .eyebrow { color: rgba(255,255,255,0.6); }
.eyebrow .dot {
  width: 6px; height: 6px; background: var(--orange); border-radius: 50%;
}

/* ---------- Nav ---------- */
.nav {
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: saturate(140%) blur(10px);
  background: rgba(248,247,244,0.85);
  border-bottom: 1px solid transparent;
  transition: border-color .2s var(--ease), background .2s var(--ease);
}
.nav.scrolled { border-color: var(--grey-line); }
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--navy);
  text-decoration: none;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.logo-mark {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--navy);
  color: var(--white);
  display: grid; place-items: center;
  font-weight: 900;
  font-size: 14px;
  position: relative;
  overflow: hidden;
}
.logo-mark::after {
  content: "";
  position: absolute;
  inset: auto 0 0 0;
  height: 4px;
  background: var(--orange);
}
.nav-links {
  display: flex;
  gap: 28px;
  align-items: center;
}
.nav-link {
  color: var(--near-black);
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  position: relative;
  padding: 6px 0;
}
.nav-link::after {
  content: "";
  position: absolute;
  left: 0; right: 100%; bottom: 0;
  height: 1.5px;
  background: var(--orange);
  transition: right .3s var(--ease);
}
.nav-link:hover::after { right: 0; }
.nav-cta { padding: 12px 18px; }
@media (max-width: 820px) {
  .nav-links .nav-link { display: none; }
}

/* ---------- Hero ---------- */
.hero {
  position: relative;
  padding-top: clamp(48px, 6vw, 96px);
  padding-bottom: clamp(60px, 8vw, 120px);
  overflow: hidden;
}
.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 0.9fr);
  gap: clamp(32px, 5vw, 80px);
  align-items: end;
}
@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; } }

/* Hero animated headline */
@keyframes heroWordIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero-word {
  display: inline-block;
  opacity: 0;
  animation: heroWordIn .55s var(--ease) forwards;
}
/* line-break placeholder so <br> still works with word-splitting */
.hero-br { display: block; }

.hero h1 .mark-orange {
  color: var(--orange);
  font-style: italic;
  font-weight: 500;
}
.hero h1 .underline-brush {
  position: relative;
  white-space: nowrap;
}
.hero h1 .underline-brush::after {
  content: "";
  position: absolute;
  left: -2%;
  right: -2%;
  bottom: -2px;
  height: 10px;
  background: var(--orange);
  opacity: 0.25;
  transform: skewX(-8deg);
}

.hero-sub {
  margin-top: 28px;
  max-width: 520px;
  color: var(--muted);
}
.hero-ctas {
  display: flex;
  gap: 14px;
  margin-top: 40px;
  align-items: center;
  flex-wrap: wrap;
}
.hero-meta {
  margin-top: 48px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
  padding-top: 28px;
  border-top: 1px solid var(--grey-line);
  max-width: 540px;
}
.hero-meta .stat-num {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 32px;
  letter-spacing: -0.02em;
  color: var(--navy);
}
.hero-meta .stat-label {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}

/* Hero right card */
.hero-card {
  position: relative;
  background: var(--navy);
  color: var(--white);
  border-radius: var(--radius-lg);
  padding: 28px;
  overflow: hidden;
  min-height: 420px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.hero-card::before {
  content: "";
  position: absolute;
  right: -60px; top: -60px;
  width: 240px; height: 240px;
  background: radial-gradient(circle at 30% 30%, rgba(255,107,53,0.6), rgba(255,107,53,0) 60%);
}
.hc-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}
.hc-live {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px;
  font-family: ui-monospace, Menlo, monospace;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.1em;
}
.hc-live::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: var(--orange);
  animation: pulse 2s infinite;
}
.hc-campaign {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.06em;
}
.hc-kpi {
  margin-top: 24px;
  position: relative;
  z-index: 1;
}
.hc-kpi .num {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 72px;
  letter-spacing: -0.03em;
  line-height: 0.95;
}
.hc-kpi .lbl {
  color: rgba(255,255,255,0.68);
  font-size: 14px;
  margin-top: 8px;
}
.hc-kpi .delta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(34,197,94,0.18);
  color: #86efac;
  font-size: 13px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  margin-top: 10px;
}

.hc-chart {
  position: relative;
  height: 110px;
  z-index: 1;
  margin-top: 20px;
}
.hc-chart svg { width: 100%; height: 100%; }

.hc-rows {
  margin-top: 20px;
  display: grid;
  gap: 10px;
  position: relative;
  z-index: 1;
}
.hc-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 16px;
  align-items: center;
  padding: 12px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  font-size: 13px;
}
.hc-row .name { font-weight: 500; }
.hc-row .ctr { color: rgba(255,255,255,0.7); font-family: ui-monospace, Menlo, monospace; }
.hc-row .conv { color: #86efac; font-family: ui-monospace, Menlo, monospace; }

/* ---------- Persona selector ---------- */
.persona-bar {
  background: var(--grey);
  border-top: 1px solid var(--grey-line);
  border-bottom: 1px solid var(--grey-line);
  padding: clamp(40px, 5vw, 72px) 0;
}
.persona-bar .eyebrow { margin-bottom: 28px; }
.persona-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 720px) { .persona-cards { grid-template-columns: 1fr; } }
.persona-card {
  position: relative;
  background: var(--white);
  border: 1.5px solid var(--grey-line);
  border-radius: var(--radius-lg);
  padding: 28px 28px 24px;
  cursor: pointer;
  transition: border-color .2s var(--ease), transform .2s var(--ease), box-shadow .2s var(--ease);
  text-align: left;
}
.persona-card:hover {
  border-color: var(--navy);
  transform: translateY(-2px);
}
.persona-card.active {
  border-color: var(--navy);
  background: var(--navy);
  color: var(--white);
  box-shadow: 0 8px 24px -8px rgba(26,46,74,0.3);
}
.pc-label {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--navy);
  margin: 0 0 8px;
  transition: color .2s var(--ease);
}
.persona-card.active .pc-label { color: var(--white); }
.pc-sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
  margin: 0 0 20px;
  transition: color .2s var(--ease);
}
.persona-card.active .pc-sub { color: rgba(255,255,255,0.7); }
.pc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pc-tag {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--grey);
  color: var(--navy);
  transition: background .2s var(--ease), color .2s var(--ease);
}
.persona-card.active .pc-tag {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.9);
}
.pc-check {
  position: absolute;
  top: 20px; right: 20px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--orange);
  display: grid;
  place-items: center;
  opacity: 0;
  transition: opacity .2s var(--ease);
}
.persona-card.active .pc-check { opacity: 1; }

/* ---------- Persona content transition ---------- */
.persona-content {
  transition: opacity .3s var(--ease);
}
.persona-content.switching { opacity: 0; }

/* ---------- Marquee ---------- */
.marquee {
  border-top: 1px solid var(--grey-line);
  border-bottom: 1px solid var(--grey-line);
  padding: 20px 0;
  overflow: hidden;
  background: var(--off-white);
}
.marquee-track {
  display: flex;
  gap: 60px;
  animation: marquee 40s linear infinite;
  white-space: nowrap;
  width: max-content;
}
.marquee-item {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 18px;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 60px;
}
.marquee-item::after {
  content: "✦";
  color: var(--orange);
  font-size: 12px;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ---------- Problem section ---------- */
.problem-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
  gap: clamp(32px, 6vw, 96px);
  align-items: start;
}
@media (max-width: 880px) { .problem-grid { grid-template-columns: 1fr; } }

.problem-list {
  display: grid;
  gap: 4px;
  margin-top: 8px;
}
.problem-item {
  display: grid;
  grid-template-columns: 48px 1fr;
  gap: 20px;
  padding: 28px 0;
  border-top: 1px solid var(--grey-line);
  align-items: start;
  transition: padding .3s var(--ease);
}
.problem-item:last-child { border-bottom: 1px solid var(--grey-line); }
.problem-item:hover { padding-left: 8px; }
.problem-num {
  font-family: ui-monospace, Menlo, monospace;
  color: var(--muted);
  font-size: 13px;
  padding-top: 4px;
}
.problem-item h4 {
  margin: 0 0 6px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.01em;
}
.problem-item p {
  margin: 0;
  color: var(--muted);
  max-width: 54ch;
}

/* ---------- Services ---------- */
.services-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: end;
  margin-bottom: 60px;
}
@media (max-width: 760px) { .services-header { grid-template-columns: 1fr; } }

.services-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}
.service-card {
  grid-column: span 4;
  position: relative;
  background: var(--white);
  border: 1px solid var(--grey-line);
  border-radius: var(--radius-lg);
  padding: 32px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: transform .3s var(--ease), border-color .3s var(--ease), box-shadow .3s var(--ease);
  cursor: default;
  overflow: hidden;
}
.service-card.wide { grid-column: span 6; }
.service-card.feature { grid-column: span 8; background: var(--navy); color: var(--white); border-color: var(--navy); }
.service-card.feature .s-meta,
.service-card.feature .s-desc { color: rgba(255,255,255,0.72); }
.service-card:hover {
  transform: translateY(-2px);
  border-color: var(--near-black);
}
.service-card.feature:hover { border-color: var(--orange); }

@media (max-width: 980px) {
  .service-card, .service-card.wide, .service-card.feature { grid-column: span 6; }
}
@media (max-width: 620px) {
  .service-card, .service-card.wide, .service-card.feature { grid-column: span 12; }
}

.s-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.s-idx {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
}
.service-card.feature .s-idx { color: rgba(255,255,255,0.5); }

.s-tag {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--grey);
  color: var(--navy);
}
.service-card.feature .s-tag { background: rgba(255,107,53,0.18); color: var(--orange); }

.s-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 28px;
  letter-spacing: -0.015em;
  margin: 24px 0 10px;
  line-height: 1.05;
}
.service-card.feature .s-title { font-size: 40px; }
.s-desc {
  font-size: 15px;
  color: var(--muted);
  max-width: 42ch;
  line-height: 1.55;
}
.s-meta {
  display: flex;
  gap: 14px;
  margin-top: 22px;
  font-size: 13px;
  color: var(--muted);
  flex-wrap: wrap;
}
.s-meta span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.s-meta span::before {
  content: "";
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--orange);
}

.s-visual {
  position: absolute;
  inset: auto -20px -20px auto;
  width: 160px;
  height: 160px;
  opacity: 0.9;
  pointer-events: none;
}
.service-card.feature .s-visual-big {
  position: relative;
  inset: auto;
  margin-top: 24px;
  width: 100%;
  height: 140px;
  opacity: 1;
}

/* ---------- Pillars ---------- */
.pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 60px;
}
@media (max-width: 880px) { .pillars { grid-template-columns: 1fr; } }
.pillar {
  padding: 36px 32px;
  background: var(--off-white);
  border-radius: var(--radius-lg);
  border: 1px solid transparent;
  transition: border-color .3s var(--ease), transform .3s var(--ease);
  position: relative;
}
.section-grey .pillar { background: var(--white); }
.pillar:hover { transform: translateY(-2px); border-color: var(--orange); }
.pillar .p-num {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  color: var(--orange);
  letter-spacing: 0.1em;
  margin-bottom: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pillar .p-num svg { color: var(--navy); }
.pillar h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 26px;
  letter-spacing: -0.015em;
  margin: 0 0 12px;
  color: var(--navy);
}
.pillar p {
  margin: 0;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.55;
}

/* ---------- About ---------- */
.about-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: clamp(32px, 5vw, 80px);
  align-items: center;
}
@media (max-width: 900px) { .about-grid { grid-template-columns: 1fr; } }

.about-photo {
  position: relative;
  aspect-ratio: 4/5;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--grey);
}
.about-photo .placeholder {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(
      45deg,

function useTweaks() {
  const [tweaks, setTweaksState] = useState2(() => window.TWEAKS || {});
  const [visible, setVisible] = useState2(false);

  useEffect2(() => {
    const html = document.documentElement;
    html.setAttribute('data-accent', tweaks.accentHue || 'orange');
    html.setAttribute('data-density', tweaks.density || 'roomy');
  }, [tweaks]);

  useEffect2(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setVisible(true);
      if (d.type === '__deactivate_edit_mode') setVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweaks = (next) => {
    setTweaksState(next);
    const diff = {};
    Object.keys(next).forEach(k => { if (next[k] !== (window.TWEAKS || {})[k]) diff[k] = next[k]; });
    if (Object.keys(diff).length) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: diff }, '*');
    }
  };

  return { tweaks, setTweaks, visible };
}

window._RE.TweaksPanel = TweaksPanel;
window._RE.useTweaks = useTweaks;

function CtaBand() {
  const [form, setForm] = us3({
    name: '', company: '', email: '', phone: '',
    service: '', budget: '', message: '', honeypot: ''
  });
  const [errors, setErrors] = us3({});
  const [status, setStatus] = us3('idle');

  const services = ['Google Ads', 'SEO', 'Meta Ads', 'App marketing', 'Strategie / audit', 'Weet ik nog niet'];
  const budgets = ['< €1.000 / maand', '€1.000 – €2.500', '€2.500 – €5.000', '€5.000+', 'Eenmalig project'];

  const update = (k, v) => { setForm(f => ({ ...f, [k]: v })); setErrors(e => ({ ...e, [k]: undefined })); };

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Vul je naam in';
    if (!form.email.trim()) e.email = 'Vul je e-mailadres in';
    else if (!/^\S+@\S+\.\S+$/.test(form.email)) e.email = 'Dit lijkt geen geldig e-mailadres';
    if (!form.message.trim() || form.message.trim().length < 10) e.message = 'Vertel kort waar ik je mee kan helpen (min. 10 tekens)';
    return e;
  };

  const encode = (data) =>
    Object.keys(data).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(data[k])).join('&');

  const onSubmit = async (ev) => {
    ev.preventDefault();
    if (form.honeypot) return;
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length) return;
    setStatus('sending');
    try {
      await fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: encode({ 'form-name': 'contact', ...form })
      });
      setStatus('sent');
    } catch {
      setStatus('error');
    }
  };

  return (
    <section className="cta-band" id="contact">
      <div className="shell contact-grid">
        <div className="contact-left reveal">
          <div className="eyebrow" style={{ color: 'rgba(255,255,255,0.55)' }}><span className="dot" /> Neem contact op</div>

            eerlijk of ik kan helpen — en zo ja, hoe. Geen match? Dan krijg
            je alsnog een concreet advies om mee verder te gaan.
          </p>
          <div className="contact-meta">
            <a className="contact-meta-item" href="mailto:thomas@rankengine.nl">
              <span className="cm-k">E-mail</span>
              <span className="cm-v">thomas@rankengine.nl</span>
            </a>
            <a className="contact-meta-item" href="tel:+31643859989">
              <span className="cm-k">Telefoon</span>
              <span className="cm-v">06-43859989</span>
            </a>
            <div className="contact-meta-item">
              <span className="cm-k">Locatie</span>
              <span className="cm-v">Aalsmeer, NL</span>
            </div>
          </div>
        </div>

        <div className="contact-form-wrap reveal">
          {status === 'sent' ? (
            <div className="form-success">
              <div className="success-badge">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M3 9.5l4 4 8-9" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                Bericht verstuurd
              </div>
              <h3 className="h3" style={{ color: 'var(--navy)', marginTop: 20 }}>
                Bedankt, {form.name.split(' ')[0] || 'ondernemer'}.
              </h3>
              <p style={{ color: 'var(--muted)', marginTop: 12 }}>
                Ik lees je bericht vandaag nog en reageer binnen 4 uur op werkdagen. Meestal sneller.
              </p>
              <button type="button" className="btn btn-ghost" style={{ marginTop: 24 }}
                onClick={() => { setStatus('idle'); setForm({ name: '', company: '', email: '', phone: '', service: '', budget: '', message: '', honeypot: '' }); }}>
                Nog een bericht sturen
              </button>
            </div>
          ) : (
            <form className="contact-form" name="contact" data-netlify="true" data-netlify-honeypot="honeypot" onSubmit={onSubmit} noValidate>
              <input type="hidden" name="form-name" value="contact" />
              <div className="form-head">
                <h3 className="form-title">Plan een gratis adviesgesprek</h3>
                <span className="form-badge">± 2 min</span>
              </div>
              <div className="form-row two">
                <Field label="Naam" required error={errors.name}>
                  <input value={form.name} onChange={e => update('name', e.target.value)} placeholder="Voor- en achternaam" autoComplete="name" />
                </Field>
                <Field label="Bedrijf (optioneel)">
                  <input value={form.company} onChange={e => update('company', e.target.value)} placeholder="Bedrijfsnaam" autoComplete="organization" />
                </Field>
              </div>
              <div className="form-row two">
                <Field label="E-mail" required error={errors.email}>
                  <input type="email" value={form.email} onChange={e => update('email', e.target.value)} placeholder="jij@bedrijf.nl" autoComplete="email" />
                </Field>
                <Field label="Telefoon (optioneel)">
                  <input type="tel" value={form.phone} onChange={e => update('phone', e.target.value)} placeholder="06-..." autoComplete="tel" />
                </Field>
              </div>
              <Field label="Waar kan ik je mee helpen?">
                <div className="chip-row">
                  {services.map(s => (
                    <button type="button" key={s}
                      className={`chip ${form.service === s ? 'active' : ''}`}
                      onClick={() => update('service', form.service === s ? '' : s)}>
                      {s}
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="Indicatie maandbudget (optioneel)">
                <div className="chip-row">
                  {budgets.map(b => (
                    <button type="button" key={b}
                      className={`chip ${form.budget === b ? 'active' : ''}`}
                      onClick={() => update('budget', form.budget === b ? '' : b)}>
                      {b}
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="Vertel kort wat je zoekt" required error={errors.message}>
                <textarea rows="4" value={form.message} onChange={e => update('message', e.target.value)} placeholder="Waar loop je tegenaan, wat heb je al geprobeerd, wat is het doel..." />
              </Field>
              <input type="text" tabIndex="-1" autoComplete="off"
                value={form.honeypot} onChange={e => update('honeypot', e.target.value)}
                style={{ position: 'absolute', left: '-9999px', width: 1, height: 1 }} aria-hidden="true" />
              <div className="form-foot">
                <p className="form-privacy">
                  Door te versturen ga je akkoord met mijn <a href="#">privacybeleid</a>.
                  Ik gebruik je gegevens alleen om te reageren.
                </p>
                <button type="submit" className="btn btn-primary" disabled={status === 'sending'}>
                  {status === 'sending' ? 'Versturen…' : <><span>Verstuur bericht</span> <Arrow /></>}
                </button>
              </div>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

  <script type="text/babel">
const { useEffect: ue4, useState: us4 } = React;
const { useReveal, useTweaks, TweaksPanel, Nav, Hero, Marquee, Problem, Services, Pillars, About, CtaBand, Footer, PersonaSelector } = window._RE;

function App() {
  const { tweaks, setTweaks, visible } = useTweaks();
  const rootRef = useReveal();
  const [persona, setPersona] = us4('klein');

  ue4(() => {
    const handler = (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const id = a.getAttribute('href');
      if (id.length <= 1) return;
      const el = document.querySelector(id);
      if (el) {
        e.preventDefault();
        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 60, behavior: 'smooth' });
      }
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, []);

  return (
    <div ref={rootRef}>
      <Nav />
      <Hero variant={tweaks.heroVariant} persona={persona} />
      <PersonaSelector persona={persona} setPersona={setPersona} />
      <Marquee />
      <Problem persona={persona} />
      <Services />
      <Pillars />
      <About />
      <CtaBand />
      <Footer />
      <TweaksPanel visible={visible} tweaks={tweaks} setTweaks={setTweaks} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
